services:
  postgres:
    image: postgres:16-alpine
    container_name: wefund-projects-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wefund_projects_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: wefund-projects-pgadmin
    restart: unless-stopped
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api:
    build: .
    container_name: wefund-projects-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: changeme
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
  

  redpanda:
    image: redpandadata/redpanda:v24.1.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"


volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
